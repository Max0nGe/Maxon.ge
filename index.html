<!DOCTYPE html>

        /* Шрифт заголовков как в Cyberpunk */
        .tech-font { font-family: 'Audiowide', cursive; }
        /* Шрифт основного текста */
        body { font-family: 'Orbitron', sans-serif; background-color: #010101; color: #a1a1a1; }
        
        /* Неоновое свечение Cyan */
        .neon-text { text-shadow: 0 0 10px rgba(0, 255, 255, 0.7), 0 0 20px rgba(0, 255, 255, 0.5); color: #00ffff; }
        .neon-border { box-shadow: 0 0 10px rgba(0, 255, 255, 0.5); border-color: #00ffff; }
        .neon-bg { background-color: rgba(0, 255, 255, 0.1); border: 1px solid #00ffff; box-shadow: 0 0 15px rgba(0, 255, 255, 0.3); }

        /* Эффект стекла для навигации */
        .glass { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(5px); border-b: 1px solid rgba(0, 255, 255, 0.1); }
        
        /* Сетка как в Highlights */
        .grid-icon { width: 80px; height: 80px; border-radius: 50%; border: 2px solid rgba(0, 255, 255, 0.3); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; transition: 0.3s; }
        .grid-item:hover .grid-icon { border-color: #00ffff; box-shadow: 0 0 15px rgba(0, 255, 255, 0.5); color: #00ffff; }
    </style>
</head>
